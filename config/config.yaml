# IBKR Trader Engine Configuration
# See plan document for detailed parameter descriptions

# Data source configuration (LOCAL or CLOUD)
data_source_mode: "local"        # "local" (primary) or "cloud" (Supabase)

ibkr:
  host: "127.0.0.1"
  port: 7497        # 4001 for live, 7497 for paper
  scanner_client_id: 15
  spot_client_id: 16
  engine_client_id: 31
  account_id: "U13498586"
  use_margin_limit: true

market:
  entry_start: "09:00"
  entry_end: "16:00"

paths:
  logs: "logs"

# Data source paths (relative to engine root directory)
data_sources:
  gex_db: "../gex_extractor/data/gex.db"
  scanner_db: "../premium_extractor/data/scanner.db"
  tradingview_db: "../tradingView_signal_generator/data/tradingview.db"

entry:
  spread_width_primary: 10
  spread_width_fallback: 20
  short_delta_target: 0.03
  contracts_per_trade: 1
  vix_buckets:
    13-16:
      min_premium: 0.20
      rsi_upper_threshold: 50.0
      rsi_lower_threshold: 49.0
      distance:
        from_spot: 3
        from_gex_level: 1
    16-20:
      min_premium: 0.25
      rsi_upper_threshold: 55.0
      rsi_lower_threshold: 45.0
      distance:
        from_spot: 3
        from_gex_level: 1.5
    20-25:
      min_premium: 0.30
      rsi_upper_threshold: 55.0
      rsi_lower_threshold: 45.0
      distance:
        from_spot: 3
        from_gex_level: 1.5
    25-30:
      min_premium: 0.35
      rsi_upper_threshold: 55.0
      rsi_lower_threshold: 45.0
      distance:
        from_spot: 3.0
        from_gex_level: 1.5

# L2 exit — momentum-aware adverse-condition vote (see risk_manager.evaluate_exit).
# L1 (hard stop on short-strike cross) is unconditional and not configurable here.
# L2 counts how many adverse conditions are true vs the entry baseline and exits
# once >= votes_to_exit fire. All thresholds have safe code-level defaults, so the
# engine still runs if this section is removed.
exit:
  votes_to_exit: 2          # number of adverse conditions required to exit
  adx_floor: 20.0           # trend vote: ADX must be at/above this (real trend)
  adx_rise: 8.0             # trend vote: ADX must have risen >= this since entry
  vix1d_mult: 1.20          # vol vote: VIX1D >= entry_vix1d * this (move expanding)
  rsi_put: 35.0             # momentum vote (PUT): RSI at/below this and falling
  rsi_call: 65.0            # momentum vote (CALL): RSI at/above this and rising
  premium_mult: 3.0         # premium vote: debit-to-close >= credit * this

day_gate:
  enabled: true
  window_minutes: 15
  gex_by_oi_threshold: 0.0
  spot_zero_gamma_threshold: -15.0
  rsi_extreme_low: 15.0
  rsi_extreme_high: 85.0

engine:
  check_interval_seconds: 30

telegram:
  dry_run: false

dry_run: false

# Backtesting configuration (LOCAL data source only)
backtesting:
  enabled: false               # Enable backtesting mode
  backtest_date: ""            # Format: "YYYY-MM-DD" (single date, not range)
  db_path: "data/backtests.db" # Separate DB for backtest results
